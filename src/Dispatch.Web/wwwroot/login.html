<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dispatch Studio — Sign In</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="app-shell auth-shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-title">DISPATCHIFY</span>
        </div>
      </header>

      <div class="auth-container">
        <div class="auth-card">
          <div class="auth-tabs">
            <button class="auth-tab active" data-tab="login" type="button">Sign In</button>
            <button class="auth-tab" data-tab="register" type="button">Register</button>
          </div>

          <form id="login-form" class="auth-form">
            <label class="modal-field">
              <span>Email</span>
              <input id="login-email" type="email" autocomplete="email" required />
            </label>
            <label class="modal-field">
              <span>Password</span>
              <input id="login-password" type="password" autocomplete="current-password" required />
            </label>
            <p id="login-error" class="auth-error" hidden></p>
            <button class="primary" type="submit">Sign In</button>
          </form>

          <form id="register-form" class="auth-form" hidden>
            <label class="modal-field">
              <span>Email</span>
              <input id="register-email" type="email" autocomplete="email" required />
            </label>
            <label class="modal-field">
              <span>Password</span>
              <input id="register-password" type="password" autocomplete="new-password" required />
            </label>
            <p id="register-error" class="auth-error" hidden></p>
            <button class="primary" type="submit">Create Account</button>
          </form>
        </div>
      </div>
    </div>

    <script>
      document.querySelectorAll(".auth-tab").forEach((tab) => {
        tab.addEventListener("click", () => {
          document.querySelectorAll(".auth-tab").forEach((t) => t.classList.remove("active"));
          tab.classList.add("active");
          const target = tab.dataset.tab;
          document.getElementById("login-form").hidden = target !== "login";
          document.getElementById("register-form").hidden = target !== "register";
        });
      });

      async function authPost(url, body) {
        const res = await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        const text = await res.text();
        let data = null;
        try {
          data = JSON.parse(text);
        } catch {}
        return { ok: res.ok, status: res.status, data };
      }

      document.getElementById("login-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        const errorEl = document.getElementById("login-error");
        errorEl.hidden = true;
        const email = document.getElementById("login-email").value;
        const password = document.getElementById("login-password").value;
        const { ok, data } = await authPost("/api/auth/login", { email, password });
        if (ok) {
          window.location.href = "/";
        } else {
          errorEl.textContent = data?.message || "Invalid email or password.";
          errorEl.hidden = false;
        }
      });

      document.getElementById("register-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        const errorEl = document.getElementById("register-error");
        errorEl.hidden = true;
        const email = document.getElementById("register-email").value;
        const password = document.getElementById("register-password").value;
        const { ok, data } = await authPost("/api/auth/register", { email, password });
        if (ok) {
          window.location.href = "/";
        } else {
          errorEl.textContent = data?.message || "Registration failed.";
          errorEl.hidden = false;
        }
      });
    </script>
  </body>
</html>
