<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dispatch Studio</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-title">WEBB</span>
          <nav class="nav-links">
            <button class="nav-link active" type="button">Dashboard</button>
            <button class="nav-link" type="button">Settings</button>
          </nav>
        </div>
        <div class="user-meta">
          <span class="user-role">Admin</span>
          <span class="user-email">dispatch@local</span>
          <button class="ghost" type="button">Sign Out</button>
        </div>
      </header>

      <div class="workspace">
        <aside class="panel sidebar">
          <div class="panel-header">
            <div>
              <p class="eyebrow">Feed Discovery</p>
              <h2>Audio Feeds</h2>
            </div>
            <button id="refresh-states" class="ghost" type="button">Refresh</button>
          </div>

          <div class="search-box">
            <input id="feed-search" type="search" placeholder="Search feeds..." />
          </div>

          <div class="tree" id="feed-tree"></div>
        </aside>

        <main class="panel canvas" id="active-canvas">
          <div class="panel-header">
            <div>
              <p class="eyebrow">Active Canvas</p>
              <h2>Streaming Feeds</h2>
              <p class="muted">Drag a feed from the left to start streaming & transcription.</p>
            </div>
            <div class="status-pill" id="active-status">Idle</div>
          </div>

          <div class="drop-zone" id="drop-zone">
            <div class="drop-hint">
              <p>Drop feeds here to activate</p>
              <span>Streaming begins immediately</span>
            </div>
          </div>

          <div id="active-feeds" class="active-feeds"></div>
        </main>

        <aside class="panel insights">
          <div class="panel-header">
            <div>
              <p class="eyebrow">Feed Activity</p>
              <h2 id="recordings-title">Select a feed</h2>
              <p class="muted" id="recordings-subtitle">Choose an active feed to view recordings.</p>
            </div>
          </div>

          <div id="recordings" class="recordings"></div>
        </aside>
      </div>
    </div>

    <template id="tree-state-template">
      <div class="tree-node state" data-state>
        <button class="tree-toggle" type="button">▸</button>
        <span class="tree-label"></span>
        <span class="tree-count"></span>
      </div>
    </template>

    <template id="tree-county-template">
      <div class="tree-node county" data-county>
        <button class="tree-toggle" type="button">▸</button>
        <span class="tree-label"></span>
        <span class="tree-count"></span>
      </div>
    </template>

    <template id="tree-feed-template">
      <div class="tree-node feed" draggable="true">
        <span class="tree-label"></span>
        <span class="tree-status"></span>
      </div>
    </template>

    <template id="active-feed-template">
      <article class="active-feed-card">
        <div class="active-info">
          <span class="active-title"></span>
          <span class="active-meta"></span>
        </div>
        <span class="badge"></span>
        <div class="active-actions">
          <button class="primary toggle">Stop</button>
          <button class="ghost select">View activity</button>
        </div>
      </article>
    </template>

    <template id="recording-template">
      <div class="recording">
        <div class="recording-header">
          <div>
            <p class="recording-time"></p>
            <p class="recording-duration"></p>
          </div>
          <div class="recording-status">
            <span class="badge"></span>
            <span class="progress-text"></span>
          </div>
        </div>
        <div class="progress">
          <div class="progress-fill"></div>
        </div>
        <audio controls class="recording-audio"></audio>
        <pre class="recording-text"></pre>
      </div>
    </template>

    <template id="recording-day-template">
      <section class="recording-day">
        <button class="day-header" type="button">
          <span class="day-label"></span>
          <span class="day-count"></span>
        </button>
        <div class="day-list"></div>
      </section>
    </template>

    <script src="app.js"></script>
  </body>
</html>
